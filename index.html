<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malkafa | Yeni Ajans Açılış Partisi</title>
    <style>
        :root {
            --tr-red: #e30a17;
            --deep-dark: #07080c;
            --glass: rgba(255, 255, 255, 0.05);
            --gold: #ffd700;
        }

        body {
            margin: 0;
            background-color: var(--deep-dark);
            color: #ffffff;
            font-family: 'Inter', -apple-system, sans-serif;
            background-image: radial-gradient(circle at 50% 50%, rgba(227, 10, 23, 0.1) 0%, transparent 80%);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        header { text-align: center; margin-bottom: 60px; }
        .main-title { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900; margin: 0; background: linear-gradient(to right, #fff, var(--tr-red)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Ödül Kartları Tasarımı */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        .card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 30px 20px;
            text-align: center;
            backdrop-filter: blur(15px);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover { transform: translateY(-10px); border-color: var(--tr-red); background: rgba(227, 10, 23, 0.05); }
        
        /* Hareketli İkonlar */
        .icon-box { width: 100px; height: 100px; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; }
        .icon-box img { width: 100%; height: auto; display: block; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }

        /* Hareket Animasyonları */
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .float-icon { animation: float 3s ease-in-out infinite; }
        .pulse-icon { animation: pulse 2s ease-in-out infinite; }
        .rotate-icon { animation: rotate 10s linear infinite; }

        .puan-tag { color: var(--gold); font-size: 1.5rem; font-weight: 800; margin-bottom: 15px; display: block; }
        
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; color: #ccc; }
        .info-row b { color: #fff; }

        /* Kurallar Bölümü */
        .rules-wrapper {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .rules-wrapper h2 { color: var(--tr-red); border-left: 4px solid var(--tr-red); padding-left: 15px; margin-bottom: 30px; }

        .rule-list { list-style: none; padding: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .rule-item { display: flex; gap: 15px; font-size: 0.95rem; line-height: 1.5; color: #bbb; }
        .num { color: var(--tr-red); font-weight: bold; }

        @media (max-width: 768px) { .rule-list { grid-template-columns: 1fr; } }
    </style>
</head>
